<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wait</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #ffd6ec, #cde7ff, #ffc2e2, #d6f0ff);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    background: rgba(255, 255, 255, 0.9);
    padding: 50px;
    border-radius: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    backdrop-filter: blur(8px);
    transition: transform 0.6s ease, opacity 0.6s ease;
}

h1 {
    font-size: 2rem;
    color: #ff69b4;
    margin-bottom: 20px;
}

#countdown {
    font-size: 2.8rem;
    font-weight: bold;
    color: #5b9bd5;
}

small {
    display: block;
    margin-top: 15px;
    color: #666;
}

/* Confeti neutro */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background-color: #ffffff;
    opacity: 0.8;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    from {
        transform: translateY(-10vh) rotate(0deg);
    }
    to {
        transform: translateY(110vh) rotate(720deg);
    }
}

.fade-out {
    transform: scale(1.1);
    opacity: 0;
}
</style>
</head>

<body>

<div class="container" id="card">
    <h1>En construcción 🛠️ <br> Disculpe las molestias</h1>
    <div id="countdown"></div>
    <small>Hasta el 29 de abril a las 12:00 AM</small>
</div>

<script>

const targetDate = new Date(2026, 3, 29, 0, 0, 0).getTime();
const countdownElement = document.getElementById("countdown");
const card = document.getElementById("card");

function createConfetti() {
    for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor =
            ["#ffd6ec", "#cde7ff", "#ffc2e2", "#d6f0ff"][Math.floor(Math.random() * 4)];
        confetti.style.animationDuration = (2 + Math.random() * 2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
    }
}

const countdown = setInterval(function() {

    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
        clearInterval(countdown);

        createConfetti();
        card.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = "https://www.canva.com/design/DAHC2bnlY_c/KbaIUkdHP8yxo15xxm099A/edit?ui=eyJBIjp7fX0";
        }, 1500);

        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdownElement.innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s";

}, 1000);

</script>

</body>
</html>
