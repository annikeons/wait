    <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta Regresiva</title>
 

 <!-- quepereza crear un css aparte -->
<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #ffd6ec, #cde7ff, #ffc2e2, #d6f0ff);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    background: rgba(255, 255, 255, 0.8);
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    font-size: 2rem;
    color: #ff69b4;
    margin-bottom: 20px;
}

#countdown {
    font-size: 2.5rem;
    font-weight: bold;
    color: #5b9bd5;
}

small {
    display: block;
    margin-top: 15px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <h1>En construcción 🛠️ <br> Disculpe las molestias</h1>
    <div id="countdown">Cargando...</div>
    <small>Hasta el 29 de abril a las 12:00 AM</small>
</div>

<script>

const targetDate = new Date("April 28, 2026 23:59:59").getTime();

const countdown = setInterval(function() {

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

    if (distance < 0) {
        clearInterval(countdown);
        window.location.href = "https://www.canva.com/design/DAHC2bnlY_c/KbaIUkdHP8yxo15xxm099A/edit?ui=eyJBIjp7fX0";
    }

}, 1000);

</script>

</body>
</html>
</body>
</html>
